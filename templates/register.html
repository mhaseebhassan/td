{% extends "base.html" %}
{% block title %}Register — Todo App{% endblock %}

{% block content %}
<div class="card">
    <h1>Create account</h1>
    <p class="subtitle">Start organizing your life today</p>

    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Choose a password" required>
        </div>
        <button type="submit" id="register-btn" class="btn btn-primary">Create Account</button>
    </form>

    <div class="form-footer">
        Already have an account? <a href="{{ url_for('login') }}" id="login-link">Sign in</a>
    </div>
</div>
{% endblock %}
