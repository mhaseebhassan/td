{% extends "base.html" %}
{% block title %}Login — Todo App{% endblock %}

{% block content %}
<div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to manage your tasks</p>

    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary">Sign In</button>
    </form>

    <div class="form-footer">
        Don't have an account? <a href="{{ url_for('register') }}" id="register-link">Create one</a>
    </div>
</div>
{% endblock %}
